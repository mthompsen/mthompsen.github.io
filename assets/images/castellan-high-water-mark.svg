    <text x="490" y="108" fill="#7b341e">moderate</text>
    <text x="610" y="108" fill="#486581">low</text>
    <text x="370" y="144" fill="#7b341e">moderate</text>
    <text x="490" y="144" fill="#7b341e">moderate</text>
