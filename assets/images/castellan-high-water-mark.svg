    <rect x="325" y="128" width="90" height="24" rx="12" fill="#fbd38d"/>
    <rect x="445" y="128" width="90" height="24" rx="12" fill="#fbd38d"/>
    <rect x="565" y="128" width="90" height="24" rx="12" fill="#d9e2ec"/>
  </g>
  <g font-size="11.5" font-weight="bold" text-anchor="middle">
