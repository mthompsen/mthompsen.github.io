  </g>
  <line x1="40" y1="166" x2="680" y2="166" stroke="#334e68" stroke-width="2"/>
  <text x="50" y="192" font-size="13" font-weight="bold" fill="#102a43">High water mark</text>
  <g font-size="11.5" font-weight="bold" text-anchor="middle">
    <rect x="325" y="176" width="90" height="24" rx="12" fill="#fbd38d" stroke="#7b341e" stroke-width="1.5"/>
    <rect x="445" y="176" width="90" height="24" rx="12" fill="#fbd38d" stroke="#7b341e" stroke-width="1.5"/>
    <rect x="565" y="176" width="90" height="24" rx="12" fill="#d9e2ec" stroke="#486581" stroke-width="1.5"/>
