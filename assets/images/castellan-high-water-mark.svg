  <rect x="40" y="218" width="640" height="32" rx="8" fill="#102a43"/>
  <text x="360" y="239" font-size="13" fill="#ffffff" text-anchor="middle">overall = max(moderate, moderate, low) = <tspan font-weight="bold" fill="#fbd38d">MODERATE</tspan> → SP 800-53B moderate baseline (287 controls)</text>
