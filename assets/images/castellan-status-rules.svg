<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 260" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="720" height="260" fill="#ffffff"/>
  <text x="40" y="24" font-size="11" font-weight="bold" fill="#486581">WHAT THE MAPPED CHECKS SAID</text>
  <text x="430" y="24" font-size="11" font-weight="bold" fill="#486581">WHAT THE CONTROL GETS</text>
  <g font-size="13" fill="#243b53">
    <rect x="40" y="38" width="320" height="36" rx="8" fill="#f0f4f8" stroke="#bcccdc"/>
    <text x="56" y="61">all mapped checks pass</text>
    <rect x="40" y="86" width="320" height="36" rx="8" fill="#f0f4f8" stroke="#bcccdc"/>
    <text x="56" y="109">some pass, some fail</text>
    <rect x="40" y="134" width="320" height="36" rx="8" fill="#f0f4f8" stroke="#bcccdc"/>
    <text x="56" y="157">all fail</text>
    <rect x="40" y="182" width="320" height="36" rx="8" fill="#fbfdff" stroke="#2b6cb0" stroke-width="2"/>
    <text x="56" y="205">no evidence either way</text>
  </g>
  <g stroke="#334e68" stroke-width="2" marker-end="url(#arr)">
    <line x1="364" y1="56" x2="420" y2="56"/>
    <line x1="364" y1="104" x2="420" y2="104"/>
    <line x1="364" y1="152" x2="420" y2="152"/>
    <line x1="364" y1="200" x2="420" y2="200"/>
  </g>
  <g font-size="13" font-weight="bold" fill="#ffffff" text-anchor="middle">
    <rect x="430" y="38" width="190" height="36" rx="18" fill="#2f855a"/>
    <text x="525" y="61">implemented</text>
    <rect x="430" y="86" width="190" height="36" rx="18" fill="#b7791f"/>
    <text x="525" y="109">partial</text>
    <rect x="430" y="134" width="190" height="36" rx="18" fill="#c53030"/>
    <text x="525" y="157">not implemented</text>
    <rect x="430" y="182" width="190" height="36" rx="18" fill="#718096"/>
    <text x="525" y="205">not assessed</text>
  </g>
  <text x="430" y="242" font-size="11.5" font-style="italic" fill="#2b6cb0">never auto-passed: the rule that prevents rash judgment</text>
</svg>
