<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#ffffff"/>
  <rect x="30" y="95" width="160" height="90" rx="10" fill="#f0f4f8" stroke="#334e68" stroke-width="1.5"/>
  <text x="110" y="132" font-size="14" font-weight="bold" fill="#102a43" text-anchor="middle">20 checks</text>
  <text x="110" y="152" font-size="10.5" fill="#486581" text-anchor="middle">ssh · accounts · files</text>
  <text x="110" y="166" font-size="10.5" fill="#486581" text-anchor="middle">services · logs · updates</text>
  <line x1="192" y1="140" x2="248" y2="140" stroke="#334e68" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="252" y="50" width="230" height="180" rx="10" fill="#102a43"/>
  <text x="367" y="78" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Host interface</text>
  <g font-size="12" fill="#9fb3c8" font-family="Consolas, monospace" text-anchor="middle">
    <text x="367" y="103">read_text</text>
    <text x="367" y="121">exists</text>
    <text x="367" y="139">stat</text>
    <text x="367" y="157">iter_files</text>
    <text x="367" y="175">service_active</text>
  </g>
  <rect x="277" y="192" width="180" height="22" rx="11" fill="#c53030"/>
  <text x="367" y="207" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">no write methods exist</text>
  <g stroke="#334e68" stroke-width="2" marker-end="url(#arr)">
    <line x1="484" y1="105" x2="536" y2="85"/>
    <line x1="484" y1="175" x2="536" y2="195"/>
  </g>
  <rect x="540" y="45" width="160" height="84" rx="10" fill="#f0f4f8" stroke="#334e68" stroke-width="1.5"/>
  <text x="620" y="73" font-size="13.5" font-weight="bold" fill="#102a43" text-anchor="middle">LinuxHost</text>
  <text x="620" y="93" font-size="10.5" fill="#486581" text-anchor="middle">production: reads the</text>
  <text x="620" y="107" font-size="10.5" fill="#486581" text-anchor="middle">real /etc, queries systemd</text>
  <rect x="540" y="155" width="160" height="84" rx="10" fill="#fbfdff" stroke="#829ab1" stroke-width="1.5" stroke-dasharray="5 3"/>
  <text x="620" y="183" font-size="13.5" font-weight="bold" fill="#102a43" text-anchor="middle">FakeHost</text>
  <text x="620" y="203" font-size="10.5" fill="#486581" text-anchor="middle">tests: in memory, built</text>
  <text x="620" y="217" font-size="10.5" fill="#486581" text-anchor="middle">from fixture files</text>
</svg>
