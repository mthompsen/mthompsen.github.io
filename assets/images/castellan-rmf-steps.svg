<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 150" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334e68"/>
    </marker>
  </defs>
  <rect width="720" height="150" fill="#ffffff"/>
  <g stroke="#334e68" stroke-width="1.5" fill="#f0f4f8">
    <rect x="10" y="25" width="150" height="100" rx="10"/>
    <rect x="190" y="25" width="150" height="100" rx="10"/>
    <rect x="370" y="25" width="150" height="100" rx="10"/>
    <rect x="550" y="25" width="150" height="100" rx="10"/>
  </g>
  <g stroke="#334e68" stroke-width="2" marker-end="url(#arr)">
    <line x1="162" y1="75" x2="186" y2="75"/>
    <line x1="342" y1="75" x2="366" y2="75"/>
    <line x1="522" y1="75" x2="546" y2="75"/>
  </g>
  <g text-anchor="middle" fill="#102a43">
    <text x="85" y="58" font-size="15" font-weight="bold">CATEGORIZE</text>
    <text x="85" y="80" font-size="11" fill="#486581">how bad would a</text>
    <text x="85" y="95" font-size="11" fill="#486581">breach be? (FIPS 199)</text>
    <text x="265" y="58" font-size="15" font-weight="bold">SELECT</text>
    <text x="265" y="80" font-size="11" fill="#486581">which of ~1000</text>
    <text x="265" y="95" font-size="11" fill="#486581">controls apply?</text>
    <text x="445" y="58" font-size="15" font-weight="bold">IMPLEMENT</text>
    <text x="445" y="80" font-size="11" fill="#486581">put the controls</text>
    <text x="445" y="95" font-size="11" fill="#486581">in place</text>
    <text x="625" y="58" font-size="15" font-weight="bold">ASSESS</text>
    <text x="625" y="80" font-size="11" fill="#486581">verify they are</text>
    <text x="625" y="95" font-size="11" fill="#486581">actually real</text>
  </g>
</svg>
